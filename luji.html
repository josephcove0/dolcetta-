<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>luji · dolcetta</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { min-height:100%; background:#06000a; font-family:'Georgia',serif; color:#ffe6ef; }
.centered { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#06000a; }
.auth-box {
  text-align:center; max-width:340px; width:92%; padding:2rem;
  background:#18020a; border:1px solid #7f1133; border-radius:16px;
}
.auth-box h2 { font-size:14px; color:#fff1f6; margin-bottom:.4rem; letter-spacing:2px; font-weight:400; font-family:monospace; text-transform:uppercase; }
.auth-box p { font-size:11px; color:rgba(243,182,199,.4); margin-bottom:1.5rem; font-family:monospace; line-height:1.7; }
.auth-box input {
  width:100%; padding:11px 14px; background:rgba(255,255,255,.05);
  border:1px solid rgba(194,24,75,.35); border-radius:8px; color:#ffe6ef;
  font-size:13px; outline:none; margin-bottom:.8rem; font-family:monospace; text-align:center;
}
.auth-box input:focus { border-color:#c2184b; }
.auth-box .main-btn {
  width:100%; padding:11px; background:transparent; border:1px solid #c2184b;
  color:#c2184b; border-radius:30px; font-size:12px; letter-spacing:2px;
  font-family:monospace; cursor:pointer; transition:all .3s; margin-top:.3rem;
}
.auth-box .main-btn:hover { background:#c2184b; color:#150003; }
.err-msg { font-size:11px; color:#c2184b; margin-top:.7rem; min-height:1rem; font-family:monospace; }
.ok-msg { font-size:11px; color:#5dcaa5; margin-top:.7rem; min-height:1rem; font-family:monospace; }

#admin-ui { max-width:760px; margin:0 auto; padding:2rem 1.5rem 5rem; }
.admin-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:1.2rem; padding-bottom:1rem; border-bottom:1px solid rgba(192,50,74,.3);
}
.admin-header h1 { font-size:14px; color:#fff1f6; font-weight:400; letter-spacing:3px; text-transform:uppercase; font-family:monospace; }
.hdr-links { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
.hdr-links a, .hdr-links button { font-size:11px; color:rgba(194,24,75,.55); font-family:monospace; text-decoration:none; letter-spacing:1px; background:none; border:none; cursor:pointer; }
.hdr-links a:hover, .hdr-links button:hover { color:#c2184b; }

.tabs {
  display:flex; gap:8px; margin-bottom:1.3rem; flex-wrap:wrap;
}
.tab-btn {
  background:rgba(25,3,8,.7); border:1px solid rgba(194,24,75,.35); color:rgba(243,182,199,.6);
  padding:9px 16px; border-radius:999px; cursor:pointer; font-family:monospace; font-size:11px; letter-spacing:1.5px;
  transition:all .2s;
}
.tab-btn:hover { border-color:#c2184b; color:#c2184b; }
.tab-btn.active { background:rgba(194,24,75,.14); border-color:#c2184b; color:#fff1f6; }
.tab-panel { display:none; }
.tab-panel.active { display:block; }

.sec-title { font-size:10px; color:rgba(194,24,75,.55); letter-spacing:2px; text-transform:uppercase; font-family:monospace; margin-bottom:1rem; }
.panel-card {
  background:#18020a; border:1px solid rgba(192,50,74,.22); border-radius:14px; padding:1.3rem;
}
#memory-list { display:flex; flex-direction:column; gap:8px; }
.mc { background:#120208; border:1px solid rgba(192,50,74,.22); border-radius:10px; padding:.9rem 1rem; display:flex; align-items:flex-start; justify-content:space-between; gap:.8rem; }
.mc.builtin { opacity:.55; }
.mc-info { flex:1; min-width:0; }
.mc-name { font-size:13px; color:#fff1f6; margin-bottom:.2rem; }
.mc-prev { font-size:11px; color:rgba(243,182,199,.45); font-style:italic; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.mc-right { display:flex; align-items:center; gap:6px; flex-shrink:0; flex-wrap:wrap; justify-content:flex-end; }
.tag { font-size:9px; font-family:monospace; letter-spacing:1px; padding:2px 7px; border-radius:10px; white-space:nowrap; }
.tag-bi { background:rgba(194,24,75,.1); color:rgba(194,24,75,.4); }
.tag-add { background:rgba(255,215,80,.14); color:#f0c060; }
.tag-img { background:rgba(93,202,165,.14); color:#5dcaa5; }
.tag-link { background:rgba(93,150,255,.12); color:#9fc0ff; }
.mini-btn {
  background:none; border:1px solid rgba(194,24,75,.28); color:rgba(243,182,199,.7);
  font-size:10px; cursor:pointer; padding:5px 10px; line-height:1; border-radius:999px;
  font-family:monospace; letter-spacing:1px; transition:all .2s;
}
.mini-btn:hover { border-color:#c2184b; color:#c2184b; }
.del-btn { border-color:rgba(194,24,75,.2); color:rgba(194,24,75,.5); }
.del-btn:hover { color:#fff1f6; background:rgba(194,24,75,.14); }

#builtin-connections-form { background:#18020a; border:1px solid rgba(192,50,74,.22); border-radius:14px; padding:1.3rem; }
#builtin-connections-form h3 { font-size:13px; color:rgba(201,72,113,.9); margin:0 0 .8rem; letter-spacing:1px; font-weight:600; }
.conn-row { display:flex; align-items:center; gap:.6rem; margin-bottom:.55rem; }
.conn-row .conn-name { font-size:11px; color:rgba(248,212,224,.75); font-family:monospace; width:180px; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.conn-row select { flex:1; background:rgba(10,4,18,.7); color:rgba(248,212,224,.9); border:1px solid rgba(201,72,113,.2); border-radius:6px; padding:.3rem .5rem; font-size:11px; font-family:monospace; }
#save-conn-btn {
  margin-top:.8rem; background:rgba(201,72,113,.15); color:#e88295; border:1px solid rgba(201,72,113,.3);
  border-radius:8px; padding:.6rem 1.2rem; font-size:12px; letter-spacing:1px; cursor:pointer; font-family:monospace;
}
#save-conn-btn:hover { background:rgba(201,72,113,.25); }
#conn-status { font-size:11px; font-family:monospace; margin-top:.5rem; color:rgba(248,212,224,.5); min-height:1rem; }

#add-form { background:#18020a; border:1px solid rgba(192,50,74,.38); border-radius:14px; padding:1.5rem; }
#add-form h3 { font-size:11px; color:#fff1f6; font-weight:400; letter-spacing:2px; margin-bottom:1rem; text-transform:uppercase; font-family:monospace; }
#form-mode {
  margin-bottom:1rem; font-size:11px; color:rgba(243,182,199,.55); font-family:monospace; letter-spacing:1px;
}
.field { margin-bottom:1.1rem; }
.field label { display:block; font-size:10px; color:rgba(194,24,75,.65); letter-spacing:1.5px; text-transform:uppercase; font-family:monospace; margin-bottom:.4rem; }
.field input[type="text"], .field textarea, .field select {
  width:100%; padding:10px 12px; background:rgba(255,255,255,.04);
  border:1px solid rgba(194,24,75,.28); border-radius:8px; color:#ffe6ef;
  font-size:14px; font-family:'Georgia',serif; outline:none; resize:vertical; transition:border-color .2s;
}
.field select { font-family:monospace; font-size:12px; cursor:pointer; }
.field select option { background:#18020a; }
.field input[type="text"]:focus, .field textarea:focus, .field select:focus { border-color:#c2184b; }
.field textarea { min-height:85px; line-height:1.65; }
.field-hint { font-size:10px; color:rgba(243,182,199,.3); font-family:monospace; margin-top:.35rem; line-height:1.5; }

.photo-drop {
  border:1px dashed rgba(194,24,75,.32); border-radius:10px; padding:1.1rem;
  text-align:center; cursor:pointer; transition:border-color .2s, background .2s;
  position:relative; min-height:65px; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:.3rem;
}
.photo-drop:hover, .photo-drop.dragover { border-color:#c2184b; background:rgba(194,24,75,.05); }
.photo-drop input[type="file"] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.pd-text { font-size:12px; color:rgba(243,182,199,.45); font-family:monospace; }
.pd-sub { font-size:10px; color:rgba(243,182,199,.25); font-family:monospace; }
#photo-preview { max-width:100%; max-height:150px; border-radius:8px; margin-top:.7rem; display:none; object-fit:cover; }
.rm-photo { font-size:10px; color:rgba(194,24,75,.45); background:none; border:none; cursor:pointer; font-family:monospace; display:none; margin-top:.3rem; }
.rm-photo:hover { color:#c2184b; }

.size-opts { display:flex; gap:8px; }
.sz { flex:1; padding:7px; text-align:center; border:1px solid rgba(194,24,75,.28); border-radius:8px; cursor:pointer; font-family:monospace; font-size:11px; color:rgba(243,182,199,.5); transition:all .2s; }
.sz.sel, .sz:hover { border-color:#c2184b; color:#c2184b; background:rgba(194,24,75,.07); }

.form-actions { display:flex; gap:10px; margin-top:1.2rem; }
#save-btn, #cancel-edit-btn {
  flex:1; padding:13px; background:transparent; border:1px solid #c2184b; color:#c2184b; border-radius:30px;
  font-size:13px; letter-spacing:2px; font-family:monospace; cursor:pointer; transition:all .3s;
}
#save-btn:hover:not(:disabled), #cancel-edit-btn:hover { background:#c2184b; color:#150003; }
#save-btn:disabled { opacity:.4; cursor:not-allowed; }
#cancel-edit-btn { display:none; border-color:rgba(243,182,199,.3); color:rgba(243,182,199,.7); }
#cancel-edit-btn:hover { background:rgba(243,182,199,.14); color:#fff1f6; border-color:rgba(243,182,199,.6); }

#status { margin-top:.9rem; font-size:12px; font-family:monospace; text-align:center; min-height:1.2rem; letter-spacing:1px; }
#status.ok { color:#5dcaa5; } #status.err { color:#c2184b; } #status.work { color:rgba(243,182,199,.5); }



@media (max-width:640px){
  #admin-ui { padding:1.3rem 1rem 4rem; }
  .admin-header { align-items:flex-start; gap:1rem; flex-direction:column; }
  .conn-row { flex-direction:column; align-items:stretch; }
  .conn-row .conn-name { width:auto; }
  .mc { flex-direction:column; }
  .mc-right { width:100%; justify-content:flex-start; }
  .form-actions { flex-direction:column; }
}

</style>
</head>
<body>

<div id="s-pw" class="centered">
  <div class="auth-box">
    <h2>✦ dolcetta</h2>
    <p>enter your password</p>
    <input type="password" id="pw-in" placeholder="password" autocomplete="current-password">
    <button class="main-btn" onclick="tryPw()">continue</button>
    <div class="err-msg" id="pw-err"></div>
  </div>
</div>

<div id="s-admin" style="display:none;">
  <div id="admin-ui">
    <div class="admin-header">
      <h1>✦ luji memories</h1>
      <div class="hdr-links">
        <a href="./index.html" target="_blank">↗ open sky</a>
        <button onclick="lock()">lock</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="create" onclick="openTab('create')">create</button>
      <button class="tab-btn" data-tab="memories" onclick="openTab('memories')">memories</button>
      <button onclick="loadMemories()" id="refresh-btn" class="tab-btn" style="margin-left:auto;">↻ refresh</button>
    </div>

    <div id="tab-create" class="tab-panel active">
      <div id="add-form">
        <h3>memory form</h3>
        <div id="form-mode">mode: creating a memory</div>
        <div class="field">
          <label>name</label>
          <input type="text" id="f-name" placeholder="e.g. The Rooftop Night">
        </div>
        <div class="field">
          <label>text</label>
          <textarea id="f-text" placeholder="what happened, how it felt, why it matters..."></textarea>
        </div>
        <div class="field">
          <label>photo <span style="opacity:.38">(optional)</span></label>
          <div class="photo-drop" id="photo-drop">
            <input type="file" id="f-photo" accept="image/*" onchange="handlePhoto(this)">
            <div class="pd-text">tap to choose a photo</div>
            <div class="pd-sub">jpg · png · webp · resized & embedded</div>
          </div>
          <img id="photo-preview" alt="">
          <button class="rm-photo" id="rm-ph-btn" onclick="removePhoto()" type="button">✕ remove photo</button>
        </div>
        <div class="field">
          <label>connect to <span style="opacity:.38">(optional)</span></label>
          <select id="f-connect">
            <option value="">— no connection —</option>
          </select>
          <div class="field-hint">draws a constellation line between this star and the chosen memory.</div>
        </div>
        <div class="field">
          <label>star size</label>
          <div class="size-opts">
            <div class="sz" onclick="selSz(1.5)" data-sz="1.5">small</div>
            <div class="sz sel" onclick="selSz(1.8)" data-sz="1.8">medium</div>
            <div class="sz" onclick="selSz(2.2)" data-sz="2.2">large</div>
          </div>
        </div>
        <div class="form-actions">
          <button id="save-btn" onclick="saveMemory()">✦ save memory</button>
          <button id="cancel-edit-btn" onclick="cancelEdit()" type="button">cancel edit</button>
        </div>
        <div id="status"></div>
      </div>
    </div>

    <div id="tab-memories" class="tab-panel">
      <div class="panel-card">
        <div class="sec-title">all memories</div>
        <div id="memory-list"><div style="font-size:12px;color:rgba(243,182,199,.3);font-family:monospace;padding:.5rem 0;">loading...</div></div>
      </div>
    </div>
</div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const PASS = '191125';
const CONFIG_KEY = 'dolcetta_supabase_config_v1';
try { localStorage.removeItem(CONFIG_KEY); } catch (_) {}
const SUPABASE_URL = 'https://hlohijsctkfdiyrgmuqp.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhsb2hpanNjdGtmZGl5cmdtdXFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNzE5OTYsImV4cCI6MjA4OTk0Nzk5Nn0.18_gY5ohSwQTRx0-HKdEhe9dvkPzl3SXANLv-EiTwDo';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const BUILTINS = [
  "The Instagram Story","The Airport Text","The Black Hole Talk",
  "I Couldn't Stop Looking","7aga fel dein","Our First Photo",
  "The Cinema Date","Pizza After","The Monday Confession","Not Yet",
  "November 17th","Would you be my girlfriend? 🤨","The Real Proposal",
  "Holding Your Hand","Sleeping on My Lap","The Pizza Video",
  "Your Scent","Your Love Letter","Before We Were Dating"
];

let extras = [];
let builtinConns = {};
let photo64 = null;
let selSzVal = 1.8;
let editingId = null;
let _adminChannel = null;

const $ = (id) => document.getElementById(id);

function tryPw(){
  const pw = $('pw-in').value;
  if (pw !== PASS) {
    showPwErr('wrong password');
    $('pw-in').value = '';
    return;
  }
  $('s-pw').style.display = 'none';
  $('s-admin').style.display = 'block';
  openTab('create');
  loadMemories();
  startAdminLiveSync();
}

function lock(){ location.reload(); }
$('pw-in').addEventListener('keydown', e => { if (e.key === 'Enter') tryPw(); });

function showPwErr(msg){ $('pw-err').textContent = msg || ''; }
function setStatus(msg, kind=''){ const el = $('status'); el.className = kind ? kind : ''; el.textContent = msg || ''; }
function setConnStatus(msg, kind=''){ const el = $('conn-status'); if (!el) return; el.style.color = kind === 'err' ? '#c2184b' : kind === 'ok' ? '#5dcaa5' : 'rgba(248,212,224,.5)'; el.textContent = msg || ''; }

function openTab(tabName){
  document.querySelectorAll('.tab-btn[data-tab]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tabName);
  });
  document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
  const panel = document.getElementById(`tab-${tabName}`);
  if (panel) panel.classList.add('active');
}

function escapeHtml(str=''){
  return String(str)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'",'&#39;');
}

function selSz(v){
  selSzVal = Number(v);
  document.querySelectorAll('.sz').forEach(el => el.classList.toggle('sel', Number(el.dataset.sz) === selSzVal));
}

function removePhoto(){
  photo64 = null;
  $('f-photo').value = '';
  $('photo-preview').style.display = 'none';
  $('photo-preview').src = '';
  $('rm-ph-btn').style.display = 'none';
  schedulePreview();
}

async function handlePhoto(input){
  const file = input.files?.[0];
  if (!file) { removePhoto(); return; }
  try {
    photo64 = await fileToDataUrl(file);
    $('photo-preview').src = photo64;
    $('photo-preview').style.display = 'block';
    $('rm-ph-btn').style.display = 'inline-block';
    schedulePreview();
  } catch (err) {
    setStatus(`photo failed: ${err.message || err}`, 'err');
  }
}

function fileToDataUrl(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(reader.error || new Error('Could not read file'));
    reader.readAsDataURL(file);
  });
}

function buildCombinedNames(extraRows = extras){
  const names = [...BUILTINS];
  extraRows.forEach(row => names.push(row.name || 'untitled memory'));
  return names;
}

function populateConnectDropdown(currentConnect = '', excludeExtraId = null){
  const sel = $('f-connect');
  if (!sel) return;
  const names = buildCombinedNames();
  const options = ['<option value="">— no connection —</option>'];
  names.forEach((name, idx) => {
    if (excludeExtraId !== null && idx >= BUILTINS.length) {
      const extra = extras[idx - BUILTINS.length];
      if (extra && String(extra.id) === String(excludeExtraId)) return;
    }
    options.push(`<option value="${idx}">${idx < BUILTINS.length ? 'built-in' : 'added'} · ${escapeHtml(name)}</option>`);
  });
  sel.innerHTML = options.join('');
  sel.value = currentConnect === null || currentConnect === undefined || currentConnect === '' ? '' : String(currentConnect);
}

function renderBuiltinConnRows(){
  const wrap = $('builtin-conn-rows');
  if (!wrap) return;
  if (!wrap) return;
  const options = ['<option value="">— none —</option>'];
  BUILTINS.forEach((name, idx) => options.push(`<option value="${idx}">${escapeHtml(name)}</option>`));
  wrap.innerHTML = BUILTINS.map((name, idx) => `
    <div class="conn-row">
      <div class="conn-name">${escapeHtml(name)}</div>
      <select data-source-idx="${idx}">
        ${options.join('')}
      </select>
    </div>
  `).join('');
  wrap.querySelectorAll('select').forEach(sel => {
    const sourceIdx = Number(sel.dataset.sourceIdx);
    sel.value = builtinConns[sourceIdx] === undefined ? '' : String(builtinConns[sourceIdx]);
  });
}

function renderMemoryList(){
  const list = $('memory-list');
  if (!list) return;
  const rows = [];

  BUILTINS.forEach((name, idx) => {
    const target = builtinConns[idx];
    rows.push(`
      <div class="mc builtin">
        <div class="mc-info">
          <div class="mc-name">${escapeHtml(name)}</div>
          <div class="mc-prev">built-in memory${target !== undefined ? ` · connects to ${escapeHtml(BUILTINS[target] || ('#' + target))}` : ''}</div>
        </div>
        <div class="mc-right">
          <span class="tag tag-bi">BUILT-IN</span>
          ${target !== undefined ? '<span class="tag tag-link">LINKED</span>' : ''}
        </div>
      </div>
    `);
  });

  extras.forEach((row, extraIdx) => {
    const globalIdx = BUILTINS.length + extraIdx;
    const prev = row.text ? escapeHtml(row.text).replace(/\n/g, ' ') : '';
    const target = row.connect_to !== null && row.connect_to !== undefined && row.connect_to !== '' ? Number(row.connect_to) : null;
    const targetName = Number.isInteger(target) ? buildCombinedNames()[target] : null;
    rows.push(`
      <div class="mc">
        <div class="mc-info">
          <div class="mc-name">${escapeHtml(row.name || 'untitled memory')}</div>
          <div class="mc-prev">${prev || 'no text'}${targetName ? ` · connects to ${escapeHtml(targetName)}` : ''}</div>
        </div>
        <div class="mc-right">
          <span class="tag tag-add">ADDED</span>
          ${row.photo ? '<span class="tag tag-img">PHOTO</span>' : ''}
          ${targetName ? '<span class="tag tag-link">LINKED</span>' : ''}
          <button class="mini-btn" type="button" onclick="startEdit('${String(row.id).replaceAll("'", "\\'")}')">edit</button>
          <button class="mini-btn del-btn" type="button" onclick="deleteMemory('${String(row.id).replaceAll("'", "\\'")}')">delete</button>
        </div>
      </div>
    `);
  });

  list.innerHTML = rows.length ? rows.join('') : '<div style="font-size:12px;color:rgba(243,182,199,.3);font-family:monospace;padding:.5rem 0;">no memories yet</div>';
}

function resetForm(){
  editingId = null;
  $('f-name').value = '';
  $('f-text').value = '';
  populateConnectDropdown('');
  selSz(1.8);
  removePhoto();
  $('save-btn').textContent = '✦ add to the sky';
  $('cancel-edit-btn').style.display = 'none';
  $('form-mode').textContent = 'mode: creating a memory';
  schedulePreview();
}

function cancelEdit(){
  resetForm();
  clearEditorPreview();
  setStatus('edit canceled');
}


function clearEditorPreview(){}

async function loadMemories(){
  setStatus('loading…', 'work');
  try {
    const [{ data: memRows, error: memErr }, { data: connRows, error: connErr }] = await Promise.all([
      sb.from('memories').select('id,name,text,photo,sz,connect_to,created_at').order('created_at', { ascending: true }),
      sb.from('built_in_connections').select('source_idx,target_idx')
    ]);

    if (memErr) throw memErr;
    extras = memRows || [];
    builtinConns = {};
    if (!connErr && Array.isArray(connRows)) {
      connRows.forEach(row => {
        builtinConns[Number(row.source_idx)] = Number(row.target_idx);
      });
    }

    populateConnectDropdown(editingId ? (extras.find(x => String(x.id) === String(editingId))?.connect_to ?? '') : '', editingId);
    renderMemoryList();
    renderBuiltinConnRows();
    if (!editingId) resetForm();
    setStatus('ready', 'ok');
  } catch (err) {
    console.error(err);
    setStatus(`load failed: ${err.message || err}`, 'err');
  }
}

async function saveMemory(){
  const name = $('f-name').value.trim();
  const text = $('f-text').value.trim();
  const connectEl = $('f-connect');
  const connectVal = connectEl ? connectEl.value : '';

  if (!name || !text) {
    setStatus('name and text are required', 'err');
    return;
  }

  const payload = {
    name,
    text,
    photo: photo64 || null,
    sz: Number(selSzVal || 1.8),
    connect_to: connectVal === '' ? null : Number(connectVal)
  };

  setStatus(editingId ? 'saving changes…' : 'adding memory…', 'work');
  $('save-btn').disabled = true;

  try {
    if (editingId) {
      const { data, error } = await sb.from('memories').update(payload).eq('id', editingId).select('id').single();
      if (error) throw error;
      try {
        const bus = new BroadcastChannel('dolcetta-memory-live');
        bus.postMessage({ type: 'memory-updated', id: data?.id ?? editingId });
        bus.close();
      } catch (_) {}
      setStatus('memory updated', 'ok');
    } else {
      const { data, error } = await sb.from('memories').insert(payload).select('id').single();
      if (error) throw error;
      try {
        const bus = new BroadcastChannel('dolcetta-memory-live');
        bus.postMessage({ type: 'memory-added', id: data?.id ?? null });
        bus.close();
      } catch (_) {}
      setStatus('memory added', 'ok');
    }
    clearEditorPreview();
    resetForm();
    await loadMemories();
    openTab('memories');
  } catch (err) {
    console.error(err);
    setStatus(`save failed: ${err.message || err}`, 'err');
  } finally {
    $('save-btn').disabled = false;
  }
}

async function deleteMemory(id){
  const idx = extras.findIndex(x => String(x.id) === String(id));
  if (idx === -1) return;
  const globalIdx = BUILTINS.length + idx;
  const affected = extras
    .filter(x => String(x.id) !== String(id))
    .filter(x => x.connect_to !== null && x.connect_to !== undefined && x.connect_to !== '')
    .map(x => {
      const current = Number(x.connect_to);
      if (!Number.isInteger(current)) return null;
      if (current === globalIdx) return { id: x.id, connect_to: null };
      if (current > globalIdx) return { id: x.id, connect_to: current - 1 };
      return null;
    })
    .filter(Boolean);

  setStatus('deleting…', 'work');
  try {
    const { error: delErr } = await sb.from('memories').delete().eq('id', id);
    if (delErr) throw delErr;
    for (const upd of affected) {
      const { error } = await sb.from('memories').update({ connect_to: upd.connect_to }).eq('id', upd.id);
      if (error) throw error;
    }
    if (String(editingId) === String(id)) { resetForm(); clearEditorPreview(); }
    // Broadcast deletion to other tabs (e.g. the main sky view) so the
    // supernova + removal animation fires immediately without waiting for a poll.
    try {
      const bus = new BroadcastChannel('dolcetta-memory-live');
      bus.postMessage({ type: 'memory-deleted', id });
      bus.close();
    } catch (_) {}
    await loadMemories();
    setStatus('memory deleted', 'ok');
  } catch (err) {
    console.error(err);
    setStatus(`delete failed: ${err.message || err}`, 'err');
  }
}

async function saveBuiltinConnections(){
  const wrap = $('builtin-conn-rows');
  if (!wrap) return;
  const selects = Array.from(document.querySelectorAll('#builtin-conn-rows select'));
  const rows = selects
    .map(sel => ({ source_idx: Number(sel.dataset.sourceIdx), target_idx: sel.value === '' ? null : Number(sel.value) }))
    .filter(row => row.target_idx !== null);

  setConnStatus('saving…');
  try {
    const { error: deleteErr } = await sb.from('built_in_connections').delete().gte('source_idx', 0);
    if (deleteErr) throw deleteErr;
    if (rows.length) {
      const { error: insertErr } = await sb.from('built_in_connections').insert(rows);
      if (insertErr) throw insertErr;
    }
    try {
      const bus = new BroadcastChannel('dolcetta-memory-live');
      bus.postMessage({ type: 'connections-updated' });
      bus.close();
    } catch (_) {}
    setConnStatus('connections saved', 'ok');
    await loadMemories();
  } catch (err) {
    console.error(err);
    setConnStatus(`save failed: ${err.message || err}`, 'err');
  }
}

function startAdminLiveSync(){
  if (_adminChannel) return;
  _adminChannel = sb
    .channel('dolcetta-admin-live')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'memories' }, () => loadMemories())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'built_in_connections' }, () => loadMemories())
    .subscribe();
}

resetForm();
</script>
