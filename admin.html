<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dolcetta admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #090713;
      --panel: rgba(20, 14, 31, 0.92);
      --panel-2: rgba(32, 20, 47, 0.9);
      --text: #f6e8ef;
      --muted: #bfa9b5;
      --pink: #e8526a;
      --pink-2: #ff8fa5;
      --line: rgba(232, 82, 106, 0.18);
      --ok: #8fe0b7;
      --warn: #ffd98a;
      --err: #ff9aa8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: Inter, system-ui, sans-serif; color: var(--text);
      background:
        radial-gradient(circle at top, rgba(232,82,106,.12), transparent 28%),
        radial-gradient(circle at bottom, rgba(255,143,165,.08), transparent 24%),
        var(--bg);
      min-height: 100vh;
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .card {
      background: var(--panel); border: 1px solid var(--line); border-radius: 20px;
      backdrop-filter: blur(10px); box-shadow: 0 15px 40px rgba(0,0,0,.35);
    }
    .hero { padding: 22px; margin-bottom: 18px; }
    .hero h1 { margin: 0 0 6px; font-size: 26px; }
    .sub { color: var(--muted); font-size: 14px; }
    .grid { display: grid; grid-template-columns: 1.05fr .95fr; gap: 18px; }
    .section { padding: 18px; }
    .section h2 { margin: 0 0 14px; font-size: 18px; }
    .field { margin-bottom: 14px; }
    label { display: block; margin-bottom: 7px; font-size: 13px; color: var(--muted); }
    input[type="text"], input[type="password"], textarea, select {
      width: 100%; border: 1px solid var(--line); background: var(--panel-2); color: var(--text);
      border-radius: 14px; padding: 12px 13px; outline: none;
    }
    textarea { min-height: 130px; resize: vertical; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btns { display: flex; flex-wrap: wrap; gap: 10px; }
    button {
      border: 1px solid var(--line); background: rgba(232,82,106,.12); color: var(--text);
      border-radius: 999px; padding: 10px 16px; cursor: pointer; font-weight: 600;
    }
    button:hover { background: rgba(232,82,106,.2); }
    button.primary { background: var(--pink); border-color: transparent; }
    button.primary:hover { filter: brightness(1.05); }
    button.ghost { background: transparent; }
    button.danger { background: rgba(255,90,120,.12); }
    .status { min-height: 22px; margin-top: 10px; font-size: 14px; }
    .ok { color: var(--ok); }
    .warn { color: var(--warn); }
    .err { color: var(--err); }
    .memory-list { display: grid; gap: 10px; max-height: 70vh; overflow: auto; }
    .memory-item {
      border: 1px solid var(--line); border-radius: 16px; padding: 14px; background: rgba(255,255,255,.02);
    }
    .memory-head { display: flex; justify-content: space-between; gap: 12px; align-items: center; }
    .memory-name { font-weight: 700; }
    .pill { font-size: 11px; padding: 4px 8px; border-radius: 999px; background: rgba(232,82,106,.14); color: var(--pink-2); }
    .memory-text { margin: 8px 0; color: #e8d6de; font-size: 14px; white-space: pre-wrap; }
    .muted { color: var(--muted); font-size: 13px; }
    .thumb { max-width: 100%; max-height: 180px; border-radius: 12px; margin-top: 10px; border: 1px solid var(--line); }
    .topbar { display: flex; flex-wrap: wrap; gap: 10px; justify-content: space-between; align-items: center; }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } .row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card hero">
      <div class="topbar">
        <div>
          <h1>✦ dolcetta admin</h1>
          <div class="sub">Supabase version. This replaces the old GitHub-token flow, so new stars save to the same backend the map should read from.</div>
        </div>
        <div class="btns">
          <button class="ghost" id="reloadBtn">↻ refresh</button>
          <a href="./index.html"><button type="button">↗ open sky</button></a>
        </div>
      </div>
    </div>

    <div class="grid">
      <div class="card section">
        <h2>connection</h2>
        <div class="field">
          <label>Supabase URL</label>
          <input id="sbUrl" type="text" placeholder="https://YOUR-PROJECT.supabase.co" />
        </div>
        <div class="field">
          <label>Supabase anon key</label>
          <input id="sbKey" type="password" placeholder="paste your anon key" />
        </div>
        <div class="field">
          <label>table name</label>
          <input id="tableName" type="text" value="memories" />
        </div>
        <div class="btns">
          <button class="primary" id="connectBtn">connect</button>
          <button class="ghost" id="saveConfigBtn">save config on this device</button>
          <button class="ghost" id="clearConfigBtn">clear saved config</button>
        </div>
        <div class="status" id="connectStatus"></div>

        <hr style="border:none;border-top:1px solid var(--line);margin:18px 0;">

        <h2>memory form</h2>
        <div class="field">
          <label>name</label>
          <input id="fName" type="text" />
        </div>
        <div class="field">
          <label>text</label>
          <textarea id="fText"></textarea>
        </div>
        <div class="row">
          <div class="field">
            <label>star size</label>
            <select id="fSize">
              <option value="1.5">small</option>
              <option value="1.8" selected>medium</option>
              <option value="2.2">large</option>
            </select>
          </div>
          <div class="field">
            <label>connect to (optional)</label>
            <select id="fConnect">
              <option value="">— no connection —</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label>photo (optional)</label>
          <input id="fPhoto" type="file" accept="image/*" />
        </div>
        <div class="btns">
          <button class="primary" id="saveBtn">✦ add to the sky</button>
          <button class="ghost" id="resetBtn">clear form</button>
        </div>
        <div class="status" id="saveStatus"></div>
      </div>

      <div class="card section">
        <h2>all memories</h2>
        <div class="memory-list" id="memoryList"></div>
      </div>
    </div>
  </div>

  <script>
    const CONFIG_KEY = 'dolcetta_supabase_config_v1';
    const DEFAULT_SUPABASE_URL = 'https://hlohijjsctkfdiyrgmuqp.supabase.co';
    const DEFAULT_SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhsb2hpanNjdGtmZGl5cmdtdXFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNzE5OTYsImV4cCI6MjA4OTk0Nzk5Nn0.18_gY5ohSwQTRx0-HKdEhe9dvkPzl3SXANLv-EiTwDo';
    const DEFAULT_SUPABASE_TABLE = 'memories';
    let supabaseClient = null;
    let currentRows = [];
    let photoBase64 = '';

    const $ = (id) => document.getElementById(id);

    function setStatus(id, text, kind = '') {
      const el = $(id);
      el.className = `status ${kind}`.trim();
      el.textContent = text;
    }

    function saveConfigLocal() {
      const payload = {
        url: $('sbUrl').value.trim(),
        key: $('sbKey').value.trim(),
        table: $('tableName').value.trim() || 'memories'
      };
      localStorage.setItem(CONFIG_KEY, JSON.stringify(payload));
      setStatus('connectStatus', 'saved on this device', 'ok');
    }

    function loadConfigLocal() {
      $('sbUrl').value = DEFAULT_SUPABASE_URL;
      $('sbKey').value = DEFAULT_SUPABASE_KEY;
      $('tableName').value = DEFAULT_SUPABASE_TABLE;
      try {
        const raw = localStorage.getItem(CONFIG_KEY);
        if (!raw) return;
        const cfg = JSON.parse(raw);
        $('sbUrl').value = cfg.url || DEFAULT_SUPABASE_URL;
        $('sbKey').value = cfg.key || DEFAULT_SUPABASE_KEY;
        $('tableName').value = cfg.table || DEFAULT_SUPABASE_TABLE;
      } catch {}
    }

    function clearForm() {
      $('fName').value = '';
      $('fText').value = '';
      $('fSize').value = '1.8';
      $('fConnect').value = '';
      $('fPhoto').value = '';
      photoBase64 = '';
      setStatus('saveStatus', '');
    }

    function escapeHtml(str = '') {
      return str
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    async function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function connectSupabase() {
      const url = $('sbUrl').value.trim();
      const key = $('sbKey').value.trim();
      const table = $('tableName').value.trim() || 'memories';

      if (!url || !key) {
        setStatus('connectStatus', 'enter the Supabase URL and anon key first', 'err');
        return;
      }

      try {
        supabaseClient = window.supabase.createClient(url, key);
        const { error } = await supabaseClient.from(table).select('id', { head: true, count: 'exact' });
        if (error) throw error;
        setStatus('connectStatus', 'connected', 'ok');
        await loadMemories();
      } catch (err) {
        supabaseClient = null;
        setStatus('connectStatus', `connection failed: ${err.message || err}`, 'err');
      }
    }

    async function loadMemories() {
      if (!supabaseClient) {
        setStatus('connectStatus', 'connect first', 'warn');
        return;
      }
      const table = $('tableName').value.trim() || 'memories';
      setStatus('connectStatus', 'loading memories...', 'warn');
      try {
        const { data, error } = await supabaseClient
          .from(table)
          .select('*')
          .order('created_at', { ascending: true, nullsFirst: true })
          .order('id', { ascending: true });
        if (error) throw error;
        currentRows = data || [];
        renderList();
        buildConnectDropdown();
        setStatus('connectStatus', `loaded ${currentRows.length} memories`, 'ok');
      } catch (err) {
        setStatus('connectStatus', `load failed: ${err.message || err}`, 'err');
      }
    }

    function buildConnectDropdown() {
      const select = $('fConnect');
      const current = select.value;
      select.innerHTML = '<option value="">— no connection —</option>';
      currentRows.forEach((row, index) => {
        const opt = document.createElement('option');
        opt.value = String(row.id ?? index);
        opt.textContent = row.name || `memory ${index + 1}`;
        select.appendChild(opt);
      });
      if ([...select.options].some(o => o.value === current)) select.value = current;
    }

    function renderList() {
      const host = $('memoryList');
      if (!currentRows.length) {
        host.innerHTML = '<div class="muted">No rows yet.</div>';
        return;
      }

      host.innerHTML = currentRows.map((row, index) => {
        const connectVal = row.connect_to ?? row.connectTo ?? '';
        const photo = row.photo || '';
        return `
          <div class="memory-item">
            <div class="memory-head">
              <div>
                <div class="memory-name">${escapeHtml(row.name || `memory ${index + 1}`)}</div>
                <div class="muted">id: ${escapeHtml(String(row.id ?? '—'))}</div>
              </div>
              <div class="pill">size ${escapeHtml(String(row.sz ?? 1.8))}</div>
            </div>
            <div class="memory-text">${escapeHtml(row.text || '')}</div>
            <div class="muted">connect_to: ${escapeHtml(String(connectVal || 'none'))}</div>
            ${photo ? `<img class="thumb" src="${photo}" alt="memory photo">` : ''}
            <div class="btns" style="margin-top:10px;">
              <button class="danger" onclick="deleteMemory(${JSON.stringify(row.id)})">delete</button>
            </div>
          </div>
        `;
      }).join('');
    }

    async function saveMemory() {
      if (!supabaseClient) {
        setStatus('saveStatus', 'connect to Supabase first', 'err');
        return;
      }

      const table = $('tableName').value.trim() || 'memories';
      const name = $('fName').value.trim();
      const text = $('fText').value.trim();
      const sz = Number($('fSize').value || 1.8);
      const connectRaw = $('fConnect').value;

      if (!name) return setStatus('saveStatus', 'give it a name', 'err');
      if (!text) return setStatus('saveStatus', 'write something first', 'err');

      setStatus('saveStatus', 'saving...', 'warn');
      $('saveBtn').disabled = true;
      try {
        const payload = {
          name,
          text,
          sz,
          photo: photoBase64 || null,
          connect_to: connectRaw === '' ? null : Number(connectRaw)
        };

        const { error } = await supabaseClient.from(table).insert(payload);
        if (error) throw error;

        clearForm();
        await loadMemories();
        setStatus('saveStatus', 'saved', 'ok');
      } catch (err) {
        setStatus('saveStatus', `save failed: ${err.message || err}`, 'err');
      } finally {
        $('saveBtn').disabled = false;
      }
    }

    async function deleteMemory(id) {
      if (!supabaseClient) return;
      if (!confirm('Delete this memory?')) return;
      const table = $('tableName').value.trim() || 'memories';
      try {
        const { error } = await supabaseClient.from(table).delete().eq('id', id);
        if (error) throw error;
        await loadMemories();
      } catch (err) {
        setStatus('connectStatus', `delete failed: ${err.message || err}`, 'err');
      }
    }

    $('fPhoto').addEventListener('change', async (e) => {
      const file = e.target.files?.[0];
      if (!file) {
        photoBase64 = '';
        return;
      }
      try {
        photoBase64 = await fileToBase64(file);
        setStatus('saveStatus', 'photo ready', 'ok');
      } catch (err) {
        photoBase64 = '';
        setStatus('saveStatus', `photo failed: ${err.message || err}`, 'err');
      }
    });

    $('connectBtn').addEventListener('click', connectSupabase);
    $('saveConfigBtn').addEventListener('click', saveConfigLocal);
    $('clearConfigBtn').addEventListener('click', () => {
      localStorage.removeItem(CONFIG_KEY);
      setStatus('connectStatus', 'saved config cleared', 'ok');
    });
    $('saveBtn').addEventListener('click', saveMemory);
    $('resetBtn').addEventListener('click', clearForm);
    $('reloadBtn').addEventListener('click', loadMemories);

    loadConfigLocal();
    connectSupabase();
  </script>
</body>
</html>
